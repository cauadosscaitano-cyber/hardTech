<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../img/hardtech_logo_v1_2-Photoroom.png">
    <link rel="stylesheet" href="../CSS/layout.css">
    <link rel="stylesheet" href="../CSS/pagamento.css">
    <link rel="stylesheet" href="../CSS/temas/tema.css">
    <title>Finalizar Compra - HARDTECH</title>
</head>
<body>
    <main id="main-content">
        <form id="formPagamento" aria-label="Formulário de finalização de compra" novalidate>
            <h1>Finalizar Compra</h1>

            <fieldset class="card">
                <legend class="card-legend">Dados do Cliente</legend>

                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required autocomplete="name" aria-required="true">

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required autocomplete="email" aria-required="true">

                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" required autocomplete="off" aria-required="true" placeholder="000.000.000-00">

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" required autocomplete="tel-national" aria-required="true" placeholder="(00) 00000-0000">

                <label for="endereco" class="full-width">Endereço</label>
                <input type="text" id="endereco" name="endereco" required autocomplete="street-address" aria-required="true" class="full-width">
            </fieldset>

            <fieldset class="card">
                <legend class="card-legend">Pagamento</legend>

                <label for="cartao">Número do Cartão</label>
                <input type="text" id="cartao" name="cartao" required autocomplete="cc-number" aria-required="true" placeholder="0000 0000 0000 0000">

                <label for="nomeCartao">Nome no Cartão</label>
                <input type="text" id="nomeCartao" name="nomeCartao" required autocomplete="cc-name" aria-required="true">

                <label for="validade">Validade</label>
                <input type="month" id="validade" name="validade" required aria-required="true">

                <label for="cvv">CVV</label>
                <input type="password" id="cvv" name="cvv" maxlength="3" required autocomplete="cc-csc" aria-required="true" placeholder="123">

                <label for="formaPagamento" class="full-width">Forma de Pagamento</label>
                <select id="formaPagamento" name="formaPagamento" required aria-required="true" class="full-width">
                    <option value="">Selecione...</option>
                    <option value="credito">Cartão de Crédito</option>
                    <option value="debito">Cartão de Débito</option>
                    <option value="pix">PIX</option>
                    <option value="boleto">Boleto</option>
                </select>
            </fieldset>

            <footer class="acoes">
                <button type="submit">Confirmar Compra</button>
                <button type="reset" class="btn-limpar">Limpar</button>
            </footer>
        </form>

        <article id="confirmacao" aria-labelledby="confirmacao-titulo">
            <h2 id="confirmacao-titulo">Resumo da Compra</h2>
            
            <figure class="resumo-imagem-box">
                <img id="resImgProduto" src="../img/hardtech_logo_v1_2-Photoroom.png" alt="Imagem do Produto" class="img-produto-resumo">
                <figcaption class="sr-only">Produto selecionado para compra</figcaption>
            </figure>

            <dl class="resumo-dados">
                <dt>Produto:</dt>
                <dd><strong id="resProduto" class="text-blue">-</strong></dd>

                <dt>Valor Total:</dt>
                <dd><strong id="resPreco" class="text-gold">-</strong></dd>
            </dl>

            <hr class="divisor-resumo">

            <dl class="detalhe-grid-dados">
                <dt>Nome:</dt>
                <dd id="resNome">-</dd>

                <dt>E-mail:</dt>
                <dd id="resEmail">-</dd>

                <dt>Forma de Pagamento:</dt>
                <dd id="resPagamento">-</dd>

                <dt>CPF:</dt>
                <dd id="resCpf">-</dd>

                <dt>Telefone:</dt>
                <dd id="resTelefone">-</dd>
            </dl>

            <footer class="acoes-resumo">
                <button type="button" onclick="enviarCompra()" class="btn-finalizar-total" aria-label="Confirmar e finalizar pedido">
                    Confirmar e Finalizar Pedido
                </button>
            </footer>
        </article>
    </main>

    <script src="../javaScript-refatorado/utils.js"></script>
    <script src="../javaScript-refatorado/layout.js"></script>
    <script src="../javaScript-refatorado/pagamento.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/layout.css">
    <link rel="stylesheet" href="../CSS/pagamento.css">
    <link rel="stylesheet" href="../CSS/temas/tema.css">
    <link rel="icon" href="../img/hardtech_logo_v1_2-Photoroom.png">
    <title>Fale Conosco - HARDTECH</title>
</head>
<body>
    <main id="main-content">
        <form id="formContato" aria-label="Formulário de contato" novalidate>
            <h1>Fale Conosco</h1>

            <fieldset class="card">
                <legend class="card-legend">Formulário de Mensagem</legend>

                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required autocomplete="name" aria-required="true" placeholder="Digite seu nome completo">

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required autocomplete="email" aria-required="true" placeholder="seuemail@exemplo.com">

                <label for="dataNascimento">Data de Nascimento</label>
                <input type="date" id="dataNascimento" name="dataNascimento" required autocomplete="bday" aria-required="true">

                <label for="mensagem" class="full-width">Sua Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="5" required aria-required="true" placeholder="Como podemos ajudar você? Escreva aqui sua dúvida ou sugestão..." class="full-width"></textarea>
            </fieldset>

            <footer class="acoes">
                <button type="submit">Visualizar Mensagem</button>
                <button type="reset" class="btn-limpar">Limpar</button>
            </footer>
        </form>

        <article id="confirmacao" aria-labelledby="confirmacao-titulo">
            <h2 id="confirmacao-titulo">Resumo do seu Contato</h2>
            
            <header class="detalhe-item produto-destaque">
                <span>Status do Envio:</span>
                <strong class="text-blue">Pronto para Enviar</strong>
            </header>

            <dl class="detalhe-grid-dados">
                <dt>Nome:</dt>
                <dd id="resNome">-</dd>

                <dt>E-mail:</dt>
                <dd id="resEmail">-</dd>

                <dt>Data de Nasc.:</dt>
                <dd id="resDataNasc">-</dd>
            </dl>

            <hr class="divisor-resumo">

            <figure class="mensagem-bloco-resumo">
                <figcaption><strong>Mensagem:</strong></figcaption>
                <blockquote id="resMensagem" class="texto-mensagem-preview">
                    <p>-</p>
                </blockquote>
            </figure>

            <footer class="acoes-resumo">
                <button type="button" onclick="enviarContato()" class="btn-finalizar-total" aria-label="Enviar mensagem agora">
                    Enviar Mensagem Agora
                </button>
            </footer>
        </article>
    </main>

    <script src="../javaScript-refatorado/utils.js"></script>
    <script src="../javaScript-refatorado/layout.js"></script>
    <script src="../javaScript-refatorado/contato.js"></script>
</body>
</html>
